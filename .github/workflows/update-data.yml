name: Cập nhật dữ liệu World Cup 2026

on:
  # Kích hoạt thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Lý do cập nhật'
        required: false
        default: 'manual'
        type: choice
        options:
          - manual
          - match-update
          - lineup-update

  # Chạy tự động mỗi 30 phút trong giờ thi đấu
  schedule:
    - cron: '*/30 11-23 * * 0-6'  # 11:00-23:59 UTC (~18:00-06:00 GMT+7)

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔄 Fetch dữ liệu từ LiveScore API (public, không cần key)
        run: |
          python3 scripts/fetch_live_data.py

      - name: 💾 Commit & push updates
        run: |
          git config user.name "WC26 Bot"
          git config user.email "bot@worldcup2026.local"
          git add data/
          git diff --staged --quiet || git commit -m "🔄 Cập nhật dữ liệu từ LiveScore ($(date +'%H:%M %d/%m'))"
          git push origin main
